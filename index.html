<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <title>Twitch Vertical View</title>
  <style>
    :root {
      --bg: #0e0e10;
      --panel: #18181b;
      --panel-2: #242429;
      --text: #efeff1;
      --muted: #adadb8;
      --accent: #9147ff;
      --accent-2: #772ce8;
      --line: #2f2f35;
      --toolbar-h: 44px;
    }

    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: var(--bg); color: var(--text); }
    body { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    button, input, select { font: inherit; }

    .app {
      width: 100vw;
      height: 100dvh;
      display: grid;
      grid-template-rows: var(--toolbar-h) minmax(0, 1fr);
      background: var(--bg);
    }

    .toolbar {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 7px;
      border-bottom: 1px solid var(--line);
      background: rgba(24, 24, 27, .98);
      z-index: 20;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .toolbar::-webkit-scrollbar { display: none; }

    .brand {
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      margin-right: auto;
      color: var(--muted);
    }

    .main-switches { display: flex; align-items: center; gap: 4px; }

    .tool-btn {
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 0 10px;
      background: var(--panel-2);
      color: var(--text);
      cursor: pointer;
      white-space: nowrap;
    }
    .tool-btn:hover { border-color: #55545f; background: #2d2d33; }
    .tool-btn.primary { border-color: var(--accent); background: var(--accent-2); }
    .tool-btn.primary:hover { background: var(--accent); }
    .tool-btn.is-main { border-color: var(--accent); background: var(--accent-2); cursor: default; }
    .tool-btn[hidden] { display: none; }

    .workspace {
      position: relative;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      background: #000;
      touch-action: auto;
    }

    .panel {
      position: absolute;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      border: 1px solid #070707;
      background: #000;
      contain: layout paint;
      isolation: isolate;
    }
    .panel[hidden] { display: none; }
    .workspace.smooth .panel {
      transition: left .28s cubic-bezier(.2,.8,.2,1), top .28s cubic-bezier(.2,.8,.2,1), width .28s cubic-bezier(.2,.8,.2,1), height .28s cubic-bezier(.2,.8,.2,1);
    }

    .panel-host {
      position: absolute;
      inset: 0;
      min-width: 0;
      min-height: 0;
      background: #000;
    }

    .panel iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #000;
    }

    .promote-btn {
      position: absolute;
      top: 7px;
      left: 7px;
      z-index: 4;
      height: 30px;
      max-width: calc(100% - 14px);
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 7px;
      padding: 0 9px;
      background: rgba(14,14,16,.78);
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      backdrop-filter: blur(7px);
      -webkit-backdrop-filter: blur(7px);
      box-shadow: 0 2px 10px rgba(0,0,0,.28);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .promote-btn:hover { background: rgba(45,45,51,.94); border-color: rgba(255,255,255,.4); }
    .promote-btn.is-main { background: rgba(119,44,232,.86); border-color: rgba(255,255,255,.32); cursor: default; }

    .empty {
      height: 100%;
      display: grid;
      place-items: center;
      padding: 16px;
      text-align: center;
      color: var(--muted);
      background: radial-gradient(circle at center, #222228 0%, #0e0e10 70%);
    }

    .edit-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 12;
      display: none;
      align-items: center;
      height: 38px;
      padding: 0 10px;
      border-bottom: 1px solid rgba(255,255,255,.26);
      background: rgba(24,24,27,.92);
      color: #fff;
      font-size: 12px;
      font-weight: 800;
      cursor: grab;
      user-select: none;
      touch-action: none;
      backdrop-filter: blur(7px);
      -webkit-backdrop-filter: blur(7px);
    }
    .edit-bar:active { cursor: grabbing; }

    .resize-handle {
      position: absolute;
      right: 0;
      bottom: 0;
      z-index: 13;
      display: none;
      width: 34px;
      height: 34px;
      cursor: nwse-resize;
      touch-action: none;
    }
    .resize-handle::before,
    .resize-handle::after {
      content: "";
      position: absolute;
      right: 6px;
      bottom: 6px;
      border-right: 3px solid rgba(255,255,255,.9);
      border-bottom: 3px solid rgba(255,255,255,.9);
    }
    .resize-handle::before { width: 18px; height: 18px; }
    .resize-handle::after { width: 10px; height: 10px; right: 12px; bottom: 12px; }

    .workspace.editing {
      touch-action: none;
      background-color: #111114;
      background-image:
        linear-gradient(rgba(255,255,255,.055) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.055) 1px, transparent 1px);
      background-size: 5% 5%;
    }
    .workspace.editing .panel {
      border: 2px solid rgba(145,71,255,.9);
      box-shadow: 0 0 0 1px rgba(255,255,255,.12), 0 10px 30px rgba(0,0,0,.35);
    }
    .workspace.editing .panel iframe { pointer-events: none; }
    .workspace.editing .edit-bar,
    .workspace.editing .resize-handle { display: flex; }
    .workspace.editing .promote-btn { display: none; }

    .edit-note {
      position: fixed;
      left: 50%;
      bottom: 12px;
      z-index: 21;
      display: none;
      transform: translateX(-50%);
      max-width: calc(100vw - 24px);
      padding: 8px 12px;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 999px;
      background: rgba(14,14,16,.9);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      pointer-events: none;
    }
    .edit-note.show { display: block; }

    .toast {
      position: fixed;
      left: 50%;
      top: calc(var(--toolbar-h) + 10px);
      z-index: 50;
      transform: translate(-50%, -8px);
      opacity: 0;
      pointer-events: none;
      padding: 8px 12px;
      border-radius: 8px;
      background: rgba(34,34,40,.96);
      border: 1px solid rgba(255,255,255,.16);
      color: #fff;
      font-size: 12px;
      transition: opacity .16s, transform .16s;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }

    .drawer-backdrop {
      position: fixed;
      inset: 0;
      z-index: 30;
      background: rgba(0, 0, 0, .64);
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease;
    }
    .drawer-backdrop.open { opacity: 1; pointer-events: auto; }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      z-index: 31;
      width: min(440px, 94vw);
      height: 100dvh;
      overflow-y: auto;
      padding: 18px;
      background: #18181b;
      border-left: 1px solid var(--line);
      transform: translateX(101%);
      transition: transform .18s ease;
      box-shadow: -20px 0 50px rgba(0, 0, 0, .35);
    }
    .drawer.open { transform: translateX(0); }

    .drawer-head { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .drawer-head h2 { margin: 0; font-size: 18px; }
    .drawer-head .tool-btn { margin-left: auto; }

    .section-title {
      margin: 20px 0 10px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
      color: var(--text);
      font-size: 13px;
      font-weight: 900;
    }

    .field { display: grid; gap: 6px; margin-bottom: 12px; }
    .field[hidden] { display: none; }
    .field label { font-size: 12px; font-weight: 800; color: var(--muted); }
    .field input, .field select {
      width: 100%;
      height: 42px;
      border: 1px solid #3a3a42;
      border-radius: 8px;
      padding: 0 11px;
      background: #0e0e10;
      color: var(--text);
      outline: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(145,71,255,.22); }

    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .drawer-actions { display: flex; gap: 8px; margin-top: 18px; }
    .drawer-actions .tool-btn { flex: 1; height: 42px; }
    .preset-actions { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
    .preset-actions .tool-btn { height: 40px; }

    .hint {
      margin: 14px 0 0;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: #111114;
      font-size: 12px;
      line-height: 1.55;
    }
    .hint strong { color: var(--text); }
    .warning { color: #ffcc66; }

    .first-run {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(0,0,0,.78);
    }
    .first-run.open { display: grid; }
    .first-run-card {
      width: min(540px, 100%);
      max-height: 92dvh;
      overflow-y: auto;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      box-shadow: 0 25px 70px rgba(0,0,0,.5);
    }
    .first-run-card h1 { margin: 0 0 5px; font-size: 22px; }
    .first-run-card p { margin: 0 0 18px; color: var(--muted); font-size: 13px; line-height: 1.55; }

    @media (max-width: 720px) {
      :root { --toolbar-h: 40px; }
      .brand { display: none; }
      .toolbar { justify-content: flex-end; }
      .tool-btn { padding: 0 8px; font-size: 12px; }
      .grid-2, .preset-actions { grid-template-columns: 1fr; }
    }

    @media (display-mode: fullscreen) {
      .toolbar.auto-hide { position: absolute; top: 0; left: 0; right: 0; opacity: .08; transition: opacity .15s; }
      .toolbar.auto-hide:hover { opacity: 1; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="toolbar" id="toolbar">
      <div class="brand">Twitch Vertical View</div>
      <div class="main-switches" aria-label="メイン画面切り替え">
        <button class="tool-btn" id="main1" type="button" data-main="0">①メイン</button>
        <button class="tool-btn" id="main2" type="button" data-main="1">②メイン</button>
        <button class="tool-btn" id="main3" type="button" data-main="2">③メイン</button>
        <button class="tool-btn" id="main4" type="button" data-main="3">④メイン</button>
      </div>
      <button class="tool-btn" id="editLayoutBtn" type="button">レイアウト編集</button>
      <button class="tool-btn" id="fullscreenBtn" type="button">全画面</button>
      <button class="tool-btn primary" id="settingsBtn" type="button">設定</button>
    </header>

    <section class="workspace" id="workspace" aria-label="Twitch multi-view layout">
      <article class="panel video-panel" id="videoTile1" data-panel-key="video0">
        <div class="panel-host" id="video1"></div>
        <button class="promote-btn is-main" type="button" data-promote="0">① MAIN</button>
        <div class="edit-bar" data-drag-handle>① Twitch</div>
        <div class="resize-handle" data-resize-handle aria-label="① Twitch のサイズ変更"></div>
      </article>

      <article class="panel video-panel" id="videoTile2" data-panel-key="video1">
        <div class="panel-host" id="video2"></div>
        <button class="promote-btn" type="button" data-promote="1">② メインへ</button>
        <div class="edit-bar" data-drag-handle>② Twitch</div>
        <div class="resize-handle" data-resize-handle aria-label="② Twitch のサイズ変更"></div>
      </article>

      <article class="panel video-panel" id="videoTile3" data-panel-key="video2">
        <div class="panel-host" id="video3"></div>
        <button class="promote-btn" type="button" data-promote="2">③ メインへ</button>
        <div class="edit-bar" data-drag-handle>③ Twitch</div>
        <div class="resize-handle" data-resize-handle aria-label="③ Twitch のサイズ変更"></div>
      </article>

      <article class="panel video-panel" id="videoTile4" data-panel-key="video3" hidden>
        <div class="panel-host" id="video4"></div>
        <button class="promote-btn" type="button" data-promote="3">④ メインへ</button>
        <div class="edit-bar" data-drag-handle>④ Twitch</div>
        <div class="resize-handle" data-resize-handle aria-label="④ Twitch のサイズ変更"></div>
      </article>

      <article class="panel chat-panel" id="chatLeftPanel" data-panel-key="chatLeft">
        <div class="panel-host" id="chatLeft"></div>
        <div class="edit-bar" data-drag-handle>左コメント</div>
        <div class="resize-handle" data-resize-handle aria-label="左コメントのサイズ変更"></div>
      </article>

      <article class="panel chat-panel" id="chatRightPanel" data-panel-key="chatRight">
        <div class="panel-host" id="chatRight"></div>
        <div class="edit-bar" data-drag-handle>右コメント</div>
        <div class="resize-handle" data-resize-handle aria-label="右コメントのサイズ変更"></div>
      </article>
    </section>
  </main>

  <div class="edit-note" id="editNote">上の帯をドラッグで移動・右下をドラッグでサイズ変更</div>
  <div class="toast" id="toast"></div>

  <div class="drawer-backdrop" id="drawerBackdrop"></div>
  <aside class="drawer" id="drawer" aria-label="設定">
    <div class="drawer-head">
      <h2>表示設定</h2>
      <button class="tool-btn" id="closeDrawer" type="button">閉じる</button>
    </div>

    <div class="field">
      <label for="streamCount">同時視聴する人数</label>
      <select id="streamCount">
        <option value="2">2人</option>
        <option value="3">3人</option>
        <option value="4">4人</option>
      </select>
    </div>

    <div class="field" data-channel-field="0">
      <label for="channel1">Twitch ①</label>
      <input id="channel1" autocomplete="off" placeholder="例: twitchdev または Twitch URL" />
    </div>
    <div class="field" data-channel-field="1">
      <label for="channel2">Twitch ②</label>
      <input id="channel2" autocomplete="off" placeholder="例: channel_name" />
    </div>
    <div class="field" data-channel-field="2">
      <label for="channel3">Twitch ③</label>
      <input id="channel3" autocomplete="off" placeholder="例: channel_name" />
    </div>
    <div class="field" data-channel-field="3">
      <label for="channel4">Twitch ④</label>
      <input id="channel4" autocomplete="off" placeholder="例: channel_name" />
    </div>

    <div class="grid-2">
      <div class="field">
        <label for="chatLeftSelect">左コメント</label>
        <select id="chatLeftSelect"></select>
      </div>
      <div class="field">
        <label for="chatRightSelect">右コメント</label>
        <select id="chatRightSelect"></select>
      </div>
    </div>

    <div class="section-title">レイアウト</div>
    <div class="preset-actions">
      <button class="tool-btn" id="verticalPresetBtn" type="button">縦型プリセット</button>
      <button class="tool-btn" id="equalPresetBtn" type="button">均等プリセット</button>
    </div>
    <div class="hint">
      右上の<strong>「レイアウト編集」</strong>を押すと、映像とコメント欄を自由に移動・サイズ変更できます。<br>
      レイアウトは<strong>2人・3人・4人ごとに別々に保存</strong>されます。
    </div>

    <div class="drawer-actions">
      <button class="tool-btn" id="resetBtn" type="button">保存を消去</button>
      <button class="tool-btn primary" id="applyBtn" type="button">保存して反映</button>
    </div>
  </aside>

  <section class="first-run" id="firstRun" aria-label="初期設定">
    <div class="first-run-card">
      <h1>最初に配信を設定</h1>
      <p>2〜4人を選び、チャンネル名または Twitch URLを入力してください。あとから右上の「設定」で変更できます。</p>

      <div class="field">
        <label for="firstStreamCount">同時視聴する人数</label>
        <select id="firstStreamCount">
          <option value="2">2人</option>
          <option value="3" selected>3人</option>
          <option value="4">4人</option>
        </select>
      </div>

      <div class="field" data-first-channel-field="0">
        <label for="first1">Twitch ①</label>
        <input id="first1" autocomplete="off" placeholder="例: twitchdev" />
      </div>
      <div class="field" data-first-channel-field="1">
        <label for="first2">Twitch ②</label>
        <input id="first2" autocomplete="off" placeholder="例: channel_name" />
      </div>
      <div class="field" data-first-channel-field="2">
        <label for="first3">Twitch ③</label>
        <input id="first3" autocomplete="off" placeholder="例: channel_name" />
      </div>
      <div class="field" data-first-channel-field="3">
        <label for="first4">Twitch ④</label>
        <input id="first4" autocomplete="off" placeholder="例: channel_name" />
      </div>

      <div class="grid-2">
        <div class="field">
          <label for="firstChatLeft">左コメント</label>
          <select id="firstChatLeft"></select>
        </div>
        <div class="field">
          <label for="firstChatRight">右コメント</label>
          <select id="firstChatRight"></select>
        </div>
      </div>

      <button class="tool-btn primary" id="startBtn" type="button" style="width:100%; height:44px">視聴開始</button>
      <div id="firstError" class="warning" style="min-height:18px; margin-top:10px; font-size:12px"></div>
    </div>
  </section>

  <script>
    (() => {
      'use strict';

      const STORAGE_KEY = 'twitchVerticalView.config.v1';
      const $ = (id) => document.getElementById(id);
      const circled = ['①', '②', '③', '④'];
      const videoHostIds = ['video1', 'video2', 'video3', 'video4'];
      const videoTileIds = ['videoTile1', 'videoTile2', 'videoTile3', 'videoTile4'];
      const allPanelKeys = ['video0', 'video1', 'video2', 'video3', 'chatLeft', 'chatRight'];
      const SNAP = 1;

      const defaultConfig = {
        version: 4,
        streamCount: 3,
        channels: ['', '', '', ''],
        chatLeft: '1',
        chatRight: '2',
        mainIndex: 0,
        layouts: {}
      };

      let config = loadConfig();
      let editMode = false;
      let interaction = null;
      let toastTimer = null;
      const renderedVideoChannels = ['', '', '', ''];
      const renderedChatChannels = { left: null, right: null };

      function clone(value) {
        return JSON.parse(JSON.stringify(value));
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function snap(value) {
        return Math.round(value / SNAP) * SNAP;
      }

      function normalizeChannel(value) {
        let v = String(value || '').trim();
        if (!v) return '';
        v = v.replace(/^@/, '');
        try {
          if (/^https?:\/\//i.test(v)) {
            const url = new URL(v);
            if (/(^|\.)twitch\.tv$/i.test(url.hostname)) {
              v = url.pathname.split('/').filter(Boolean)[0] || '';
            }
          }
        } catch (_) {}
        v = v.split(/[?#/]/)[0].trim().toLowerCase();
        return /^[a-z0-9_]{2,25}$/i.test(v) ? v : '';
      }

      function normalizeCount(value, fallback = 3) {
        const count = Number(value);
        return [2, 3, 4].includes(count) ? count : fallback;
      }

      function normalizeChat(value, streamCount, fallback) {
        const candidate = String(value);
        return Number(candidate) >= 1 && Number(candidate) <= streamCount ? candidate : String(fallback);
      }

      function rect(x, y, w, h, z = 1) {
        return { x, y, w, h, z };
      }

      function verticalPreset(count) {
        if (count === 2) {
          return {
            video0: rect(0, 0, 100, 38, 1),
            video1: rect(0, 38, 100, 29, 1),
            chatLeft: rect(0, 67, 50, 33, 1),
            chatRight: rect(50, 67, 50, 33, 1)
          };
        }
        if (count === 4) {
          return {
            video0: rect(0, 0, 100, 34, 1),
            video1: rect(0, 34, 50, 22, 1),
            video2: rect(50, 34, 50, 22, 1),
            video3: rect(0, 56, 100, 18, 1),
            chatLeft: rect(0, 74, 50, 26, 1),
            chatRight: rect(50, 74, 50, 26, 1)
          };
        }
        return {
          video0: rect(0, 0, 100, 40, 1),
          video1: rect(0, 40, 50, 28, 1),
          video2: rect(50, 40, 50, 28, 1),
          chatLeft: rect(0, 68, 50, 32, 1),
          chatRight: rect(50, 68, 50, 32, 1)
        };
      }

      function equalPreset(count) {
        const keys = Array.from({ length: count }, (_, i) => `video${i}`).concat(['chatLeft', 'chatRight']);
        const columns = 2;
        const rows = Math.ceil(keys.length / columns);
        const cellW = 100 / columns;
        const cellH = 100 / rows;
        const layout = {};
        keys.forEach((key, index) => {
          const col = index % columns;
          const rowIndex = Math.floor(index / columns);
          layout[key] = rect(col * cellW, rowIndex * cellH, cellW, cellH, 1);
        });
        return layout;
      }

      function normalizeRect(value, fallback) {
        if (!value || typeof value !== 'object') return clone(fallback);
        const w = clamp(Number(value.w) || fallback.w, 10, 100);
        const h = clamp(Number(value.h) || fallback.h, 8, 100);
        return {
          x: clamp(Number(value.x) || 0, 0, 100 - w),
          y: clamp(Number(value.y) || 0, 0, 100 - h),
          w,
          h,
          z: clamp(Math.round(Number(value.z) || 1), 1, 999)
        };
      }

      function normalizeLayouts(savedLayouts) {
        const result = {};
        [2, 3, 4].forEach((count) => {
          const defaults = verticalPreset(count);
          const source = savedLayouts?.[count] || savedLayouts?.[String(count)] || {};
          result[count] = {};
          Object.keys(defaults).forEach((key) => {
            result[count][key] = normalizeRect(source[key], defaults[key]);
          });
        });
        return result;
      }

      function loadConfig() {
        try {
          const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
          if (!saved || !Array.isArray(saved.channels)) {
            const fresh = clone(defaultConfig);
            fresh.layouts = normalizeLayouts(null);
            return fresh;
          }
          const inferred = saved.channels.length >= 4 && saved.channels[3] ? 4 : 3;
          const streamCount = normalizeCount(saved.streamCount, inferred);
          const channels = [0, 1, 2, 3].map((i) => normalizeChannel(saved.channels[i]));
          let mainIndex = Number(saved.mainIndex);
          if (!Number.isInteger(mainIndex) && Array.isArray(saved.order)) mainIndex = Number(saved.order[0]);
          if (!Number.isInteger(mainIndex) || mainIndex < 0 || mainIndex >= streamCount) mainIndex = 0;
          return {
            version: 4,
            streamCount,
            channels,
            chatLeft: normalizeChat(saved.chatLeft, streamCount, 1),
            chatRight: normalizeChat(saved.chatRight, streamCount, Math.min(2, streamCount)),
            mainIndex,
            layouts: normalizeLayouts(saved.layouts)
          };
        } catch (_) {
          const fresh = clone(defaultConfig);
          fresh.layouts = normalizeLayouts(null);
          return fresh;
        }
      }

      function saveConfig() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
      }

      function currentLayout() {
        if (!config.layouts[config.streamCount]) config.layouts[config.streamCount] = verticalPreset(config.streamCount);
        return config.layouts[config.streamCount];
      }

      function activePanelKeys() {
        return Array.from({ length: config.streamCount }, (_, i) => `video${i}`).concat(['chatLeft', 'chatRight']);
      }

      function panelElement(key) {
        return document.querySelector(`[data-panel-key="${key}"]`);
      }

      function parentHost() { return location.hostname; }
      function canEmbedHere() { return location.protocol === 'https:' && Boolean(parentHost()); }

      function videoUrl(channel, muted) {
        const p = new URLSearchParams({
          channel,
          parent: parentHost(),
          autoplay: 'true',
          muted: muted ? 'true' : 'false'
        });
        return `https://player.twitch.tv/?${p.toString()}`;
      }

      function chatUrl(channel) {
        const p = new URLSearchParams({ parent: parentHost() });
        return `https://www.twitch.tv/embed/${encodeURIComponent(channel)}/chat?${p.toString()}`;
      }

      function makeIframe(src, title, allowFullscreen = false) {
        const iframe = document.createElement('iframe');
        iframe.src = src;
        iframe.title = title;
        iframe.loading = 'eager';
        iframe.referrerPolicy = 'strict-origin-when-cross-origin';
        iframe.allow = 'autoplay; fullscreen';
        if (allowFullscreen) iframe.allowFullscreen = true;
        return iframe;
      }

      function setEmpty(container, text) {
        container.replaceChildren();
        const div = document.createElement('div');
        div.className = 'empty';
        div.textContent = text;
        container.appendChild(div);
      }

      function renderVideo(index, force = false) {
        const container = $(videoHostIds[index]);
        const isActive = index < config.streamCount;
        const channel = isActive ? config.channels[index] : '';
        if (!isActive) {
          renderedVideoChannels[index] = '';
          container.replaceChildren();
          return;
        }
        if (!force && renderedVideoChannels[index] === channel && container.firstChild) return;
        renderedVideoChannels[index] = channel;
        container.replaceChildren();
        if (!channel) return setEmpty(container, `Twitch ${circled[index]} が未設定です`);
        if (!canEmbedHere()) return setEmpty(container, 'GitHub Pages（HTTPS）で開くとTwitchが表示されます');
        container.appendChild(makeIframe(videoUrl(channel, index !== 0), `Twitch ${circled[index]}: ${channel}`, true));
      }

      function renderVideos(force = false) {
        [0, 1, 2, 3].forEach((i) => renderVideo(i, force));
      }

      function renderChat(side, force = false) {
        const isLeft = side === 'left';
        const container = $(isLeft ? 'chatLeft' : 'chatRight');
        const selected = isLeft ? config.chatLeft : config.chatRight;
        const channelIndex = Number(selected) - 1;
        const channel = channelIndex < config.streamCount ? config.channels[channelIndex] : '';
        const sideName = isLeft ? '左' : '右';
        if (!force && renderedChatChannels[side] === channel && container.firstChild) return;
        renderedChatChannels[side] = channel;
        container.replaceChildren();
        if (!channel) return setEmpty(container, `${sideName}コメントの配信が未設定です`);
        if (!canEmbedHere()) return setEmpty(container, 'GitHub Pages（HTTPS）で開くとコメントが表示されます');
        container.appendChild(makeIframe(chatUrl(channel), `${sideName} chat: ${channel}`));
      }

      function renderChats(force = false) {
        renderChat('left', force);
        renderChat('right', force);
      }

      function applyLayout({ smooth = false } = {}) {
        const workspace = $('workspace');
        workspace.classList.toggle('smooth', smooth && !editMode);
        const layout = currentLayout();
        const active = new Set(activePanelKeys());
        allPanelKeys.forEach((key) => {
          const element = panelElement(key);
          const isActive = active.has(key);
          element.hidden = !isActive;
          if (!isActive) return;
          const r = layout[key] || verticalPreset(config.streamCount)[key];
          element.style.left = `${r.x}%`;
          element.style.top = `${r.y}%`;
          element.style.width = `${r.w}%`;
          element.style.height = `${r.h}%`;
          element.style.zIndex = String(r.z || 1);
        });
        window.setTimeout(() => workspace.classList.remove('smooth'), 320);
        updateMainButtons();
      }

      function updateMainButtons() {
        document.querySelectorAll('[data-main]').forEach((button) => {
          const index = Number(button.dataset.main);
          const active = index < config.streamCount;
          const isMain = active && index === config.mainIndex;
          button.hidden = !active;
          button.classList.toggle('is-main', isMain);
          button.disabled = isMain;
          button.textContent = `${circled[index]}メイン`;
        });
        document.querySelectorAll('[data-promote]').forEach((button) => {
          const index = Number(button.dataset.promote);
          const isMain = index === config.mainIndex;
          button.classList.toggle('is-main', isMain);
          button.textContent = isMain ? `${circled[index]} MAIN` : `${circled[index]} メインへ`;
          button.disabled = isMain;
        });
      }

      function swapRects(firstKey, secondKey) {
        const layout = currentLayout();
        const first = clone(layout[firstKey]);
        layout[firstKey] = clone(layout[secondKey]);
        layout[secondKey] = first;
      }

      function promoteToMain(index) {
        if (index < 0 || index >= config.streamCount || index === config.mainIndex) return;
        swapRects(`video${config.mainIndex}`, `video${index}`);
        config.mainIndex = index;
        saveConfig();
        applyLayout({ smooth: true });
      }

      function bringToFront(key) {
        const layout = currentLayout();
        const maxZ = Math.max(...Object.values(layout).map((item) => Number(item.z) || 1));
        layout[key].z = maxZ + 1;
        if (layout[key].z > 900) {
          Object.values(layout).forEach((item) => { item.z = 1; });
          layout[key].z = 2;
        }
      }

      function beginInteraction(event, mode) {
        if (!editMode || event.button > 0) return;
        const panel = event.currentTarget.closest('.panel');
        const key = panel.dataset.panelKey;
        const layout = currentLayout();
        const workspaceRect = $('workspace').getBoundingClientRect();
        bringToFront(key);
        applyLayout();
        interaction = {
          pointerId: event.pointerId,
          mode,
          key,
          startClientX: event.clientX,
          startClientY: event.clientY,
          startRect: clone(layout[key]),
          workspaceRect
        };
        event.currentTarget.setPointerCapture?.(event.pointerId);
        document.body.style.userSelect = 'none';
        event.preventDefault();
      }

      function updateInteraction(event) {
        if (!interaction || event.pointerId !== interaction.pointerId) return;
        const { mode, key, startClientX, startClientY, startRect, workspaceRect } = interaction;
        const dx = ((event.clientX - startClientX) / workspaceRect.width) * 100;
        const dy = ((event.clientY - startClientY) / workspaceRect.height) * 100;
        const layout = currentLayout();
        const current = layout[key];
        const minW = Math.max(10, (140 / workspaceRect.width) * 100);
        const minH = Math.max(8, (90 / workspaceRect.height) * 100);

        if (mode === 'move') {
          current.x = snap(clamp(startRect.x + dx, 0, 100 - startRect.w));
          current.y = snap(clamp(startRect.y + dy, 0, 100 - startRect.h));
        } else {
          current.w = snap(clamp(startRect.w + dx, minW, 100 - startRect.x));
          current.h = snap(clamp(startRect.h + dy, minH, 100 - startRect.y));
        }
        applyLayout();
        event.preventDefault();
      }

      function finishInteraction(event) {
        if (!interaction || (event && event.pointerId !== interaction.pointerId)) return;
        interaction = null;
        document.body.style.userSelect = '';
        saveConfig();
      }

      function toggleEditMode(force) {
        editMode = typeof force === 'boolean' ? force : !editMode;
        $('workspace').classList.toggle('editing', editMode);
        $('editLayoutBtn').classList.toggle('primary', editMode);
        $('editLayoutBtn').textContent = editMode ? '編集終了' : 'レイアウト編集';
        $('editNote').classList.toggle('show', editMode);
        if (!editMode) {
          finishInteraction();
          saveConfig();
          showToast('レイアウトを保存しました');
        }
      }

      function showToast(message) {
        const toast = $('toast');
        toast.textContent = message;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), 1500);
      }

      function applyPreset(factory, label) {
        config.layouts[config.streamCount] = factory(config.streamCount);
        config.mainIndex = 0;
        saveConfig();
        applyLayout({ smooth: true });
        showToast(`${label}に変更しました`);
      }

      function fillChatOptions(select, count, selectedValue, fallback = 1) {
        const safeSelected = normalizeChat(selectedValue, count, fallback);
        select.replaceChildren();
        for (let i = 1; i <= count; i += 1) {
          const option = document.createElement('option');
          option.value = String(i);
          option.textContent = `${circled[i - 1]}のコメント`;
          option.selected = String(i) === safeSelected;
          select.appendChild(option);
        }
      }

      function updateChannelFieldVisibility(prefix, count) {
        const selector = prefix === 'first' ? '[data-first-channel-field]' : '[data-channel-field]';
        document.querySelectorAll(selector).forEach((field) => {
          const index = Number(prefix === 'first' ? field.dataset.firstChannelField : field.dataset.channelField);
          field.hidden = index >= count;
        });
      }

      function updateDrawerCountUI(count) {
        updateChannelFieldVisibility('drawer', count);
        fillChatOptions($('chatLeftSelect'), count, $('chatLeftSelect').value || config.chatLeft, 1);
        fillChatOptions($('chatRightSelect'), count, $('chatRightSelect').value || config.chatRight, Math.min(2, count));
      }

      function updateFirstCountUI(count) {
        updateChannelFieldVisibility('first', count);
        fillChatOptions($('firstChatLeft'), count, $('firstChatLeft').value || '1', 1);
        fillChatOptions($('firstChatRight'), count, $('firstChatRight').value || String(Math.min(2, count)), Math.min(2, count));
      }

      function syncForm() {
        $('streamCount').value = String(config.streamCount);
        [0, 1, 2, 3].forEach((i) => { $(`channel${i + 1}`).value = config.channels[i]; });
        updateDrawerCountUI(config.streamCount);
        $('chatLeftSelect').value = config.chatLeft;
        $('chatRightSelect').value = config.chatRight;
      }

      function readDrawerConfig() {
        const streamCount = normalizeCount($('streamCount').value);
        const channels = [0, 1, 2, 3].map((i) => normalizeChannel($(`channel${i + 1}`).value));
        return {
          version: 4,
          streamCount,
          channels,
          chatLeft: normalizeChat($('chatLeftSelect').value, streamCount, 1),
          chatRight: normalizeChat($('chatRightSelect').value, streamCount, Math.min(2, streamCount)),
          mainIndex: config.mainIndex < streamCount ? config.mainIndex : 0,
          layouts: config.layouts
        };
      }

      function renderAll({ forceVideos = false, forceChats = false } = {}) {
        renderVideos(forceVideos);
        renderChats(forceChats);
        applyLayout();
        syncForm();
      }

      function openDrawer() {
        if (editMode) toggleEditMode(false);
        syncForm();
        $('drawer').classList.add('open');
        $('drawerBackdrop').classList.add('open');
      }

      function closeDrawer() {
        $('drawer').classList.remove('open');
        $('drawerBackdrop').classList.remove('open');
      }

      function showFirstRunIfNeeded() {
        if (!config.channels.slice(0, config.streamCount).some(Boolean)) {
          $('firstStreamCount').value = String(config.streamCount);
          updateFirstCountUI(config.streamCount);
          $('firstRun').classList.add('open');
        }
      }

      document.querySelectorAll('[data-drag-handle]').forEach((handle) => {
        handle.addEventListener('pointerdown', (event) => beginInteraction(event, 'move'));
        handle.addEventListener('pointermove', updateInteraction);
        handle.addEventListener('pointerup', finishInteraction);
        handle.addEventListener('pointercancel', finishInteraction);
      });

      document.querySelectorAll('[data-resize-handle]').forEach((handle) => {
        handle.addEventListener('pointerdown', (event) => beginInteraction(event, 'resize'));
        handle.addEventListener('pointermove', updateInteraction);
        handle.addEventListener('pointerup', finishInteraction);
        handle.addEventListener('pointercancel', finishInteraction);
      });

      $('editLayoutBtn').addEventListener('click', () => toggleEditMode());
      $('settingsBtn').addEventListener('click', openDrawer);
      $('closeDrawer').addEventListener('click', closeDrawer);
      $('drawerBackdrop').addEventListener('click', closeDrawer);

      $('streamCount').addEventListener('change', () => {
        updateDrawerCountUI(normalizeCount($('streamCount').value));
      });

      $('firstStreamCount').addEventListener('change', () => {
        updateFirstCountUI(normalizeCount($('firstStreamCount').value));
      });

      $('applyBtn').addEventListener('click', () => {
        const previous = config;
        const next = readDrawerConfig();
        config = next;
        saveConfig();
        [0, 1, 2, 3].forEach((i) => {
          const activeChanged = (i < previous.streamCount) !== (i < next.streamCount);
          const channelChanged = previous.channels[i] !== next.channels[i];
          if (activeChanged || channelChanged) renderVideo(i, true);
        });
        renderChats(true);
        applyLayout({ smooth: true });
        syncForm();
        closeDrawer();
      });

      $('verticalPresetBtn').addEventListener('click', () => applyPreset(verticalPreset, '縦型プリセット'));
      $('equalPresetBtn').addEventListener('click', () => applyPreset(equalPreset, '均等プリセット'));

      $('resetBtn').addEventListener('click', () => {
        if (!confirm('保存したチャンネル設定とレイアウトを消去しますか？')) return;
        localStorage.removeItem(STORAGE_KEY);
        config = clone(defaultConfig);
        config.layouts = normalizeLayouts(null);
        renderedVideoChannels.fill('');
        renderedChatChannels.left = null;
        renderedChatChannels.right = null;
        renderAll({ forceVideos: true, forceChats: true });
        closeDrawer();
        $('firstStreamCount').value = '3';
        updateFirstCountUI(3);
        $('firstRun').classList.add('open');
      });

      document.querySelectorAll('[data-main]').forEach((button) => {
        button.addEventListener('click', () => promoteToMain(Number(button.dataset.main)));
      });

      document.querySelectorAll('[data-promote]').forEach((button) => {
        button.addEventListener('click', () => promoteToMain(Number(button.dataset.promote)));
      });

      $('fullscreenBtn').addEventListener('click', async () => {
        try {
          if (!document.fullscreenElement) await document.documentElement.requestFullscreen();
          else await document.exitFullscreen();
        } catch (err) {
          console.warn('Fullscreen unavailable:', err);
        }
      });

      document.addEventListener('fullscreenchange', () => {
        $('fullscreenBtn').textContent = document.fullscreenElement ? '全画面終了' : '全画面';
        $('toolbar').classList.toggle('auto-hide', Boolean(document.fullscreenElement));
      });

      $('startBtn').addEventListener('click', () => {
        const streamCount = normalizeCount($('firstStreamCount').value);
        const channels = [0, 1, 2, 3].map((i) => normalizeChannel($(`first${i + 1}`).value));
        const activeChannels = channels.slice(0, streamCount);
        if (!activeChannels.every(Boolean)) {
          $('firstError').textContent = `${streamCount}人分すべて、有効なTwitchチャンネル名またはURLを入力してください。`;
          return;
        }
        config = {
          version: 4,
          streamCount,
          channels,
          chatLeft: normalizeChat($('firstChatLeft').value, streamCount, 1),
          chatRight: normalizeChat($('firstChatRight').value, streamCount, Math.min(2, streamCount)),
          mainIndex: 0,
          layouts: normalizeLayouts(config.layouts)
        };
        saveConfig();
        $('firstError').textContent = '';
        $('firstRun').classList.remove('open');
        renderAll({ forceVideos: true, forceChats: true });
      });

      window.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          closeDrawer();
          if (editMode) toggleEditMode(false);
        }
        if (event.key.toLowerCase() === 'l' && !/input|select|textarea/i.test(document.activeElement?.tagName || '')) {
          toggleEditMode();
        }
        if (event.key.toLowerCase() === 's' && !/input|select|textarea/i.test(document.activeElement?.tagName || '')) {
          openDrawer();
        }
      });

      window.addEventListener('resize', () => applyLayout(), { passive: true });

      updateFirstCountUI(3);
      renderAll();
      showFirstRunIfNeeded();
    })();
  </script>
</body>
</html>
